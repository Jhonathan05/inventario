services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: inventario-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-inventario_db}
      POSTGRES_USER: ${DB_USER:-inventario_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-inventario_password}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - inventario-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-inventario_user} -d ${DB_NAME:-inventario_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5434:5432"

  # Backend Node.js
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventario-api-dev
    restart: unless-stopped
    command: [ "/bin/sh", "/app/start.sh" ]
    labels:
      dev.orbstack.domains: "api.inventario.local"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-inventario_user}:${DB_PASSWORD:-inventario_password}@postgres:5432/${DB_NAME:-inventario_db}
      JWT_SECRET: ${JWT_SECRET:-clave_secreta_desarrollo_inventario}
      PORT: 3001
      UPLOAD_DIR: /app/uploads
      ALLOWED_ORIGINS: http://localhost:8085,http://inventario.local,http://inventario.local:8085
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_dev:/app/uploads
    networks:
      - inventario-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "3003:3001"

  # Frontend React (con Vite server para hot-reload)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: inventario-web-dev
    restart: unless-stopped
    command: sh -c "npm run dev -- --host"
    labels:
      dev.orbstack.domains: "inventario.local"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "8085:5173"
    networks:
      - inventario-network
    environment:
      - VITE_API_URL=http://localhost:3003/api
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      backend:
        condition: service_healthy

  # Adminer Database GUI
  adminer:
    image: adminer
    container_name: inventario-db-admin-dev
    restart: unless-stopped
    labels:
      dev.orbstack.domains: "db.inventario.local"
    ports:
      - "8084:8080"
    networks:
      - inventario-network
    depends_on:
      - postgres

networks:
  inventario-network:
    driver: bridge

volumes:
  postgres_data_dev:
  uploads_dev:
